
# Configuración del sitio GitHub Pages
title: "TEKLA STRUCTURES"
description: "Documentación y guía de uso"
# O cualquier theme de GitHub
remote_theme: just-the-docs/just-the-docs

kramdown:
  parse_block_html: true

# Set a path/url to a logo that will be displayed instead of the title
logo: "img/logos/tekla_logo.png"

# Set a path/url to a favicon that will be displayed by the browser
favicon_ico: "/img/logos/favicon.png"

defaults:
  - scope:
      path: ""
    values:
      toc: true

toc:
  min_level: 1  # Desde H1 (#)
  max_level: 3  # Hasta H3 (###)

mermaid:
  # Version of mermaid library
  # Pick an available version from https://cdn.jsdelivr.net/npm/mermaid/
  version: "9.1.3"

# Configuración opcional
show_downloads: false
google_analytics: # Tu código GA si lo necesitas

# Enable or disable heading anchors
heading_anchors: true

# callouts

callouts:
  highlight:
    color: yellow
  important:
    title: Importante
    color: blue
  new:
    title: Nuevo
    color: green
  note:
    title: Nota
    color: purple
  warning:
    title: Cuidado!
    color: red