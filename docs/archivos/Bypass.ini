rem To take this file into use, add the following parameter
rem to the command line of Tekla Structures shortcut:
rem -I "..\TeklaStructures\2021.0\environments\southamerica\Bypass.ini"
rem
rem An example of the whole command line with the added parameter:
rem ..\TeklaStructures\2021.0\nt\bin\TeklaStructures.exe -I "..\TeklaStructures\2021.0\environments\southamerica\Bypass.ini" -i "C:\Users\[user_name]\AppData\Local\Tekla Structures\2021.0\UserSettings\user.ini"
rem
rem ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
rem *** Setting the license server
rem ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
rem This variable should point license server in use
rem set XS_LICENSE_SERVER_HOST=27007@MY_LICENSE_SERVER_NAME

rem ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
rem *** Setting the environment
rem ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
rem This variable should point to the environment specific .ini file
set XS_DEFAULT_ENVIRONMENT=%XSDATADIR%\environments\southamerica\env_Southamerica.ini

